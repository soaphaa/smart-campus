<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Campus — Campus Marketplace</title>
    <link rel="stylesheet" href="home.css">
    <script src="https://kit.fontawesome.com/44fe28e16d.js" crossorigin="anonymous"></script>
</head>

<body>
    <header id="topbar">
        <div id="brand">Smart Campus</div>

        <div id="search-wrap">
            <i id="search-icon" class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search items, courses, materials..." autocomplete="off">
            <div id="search-suggestions" class="hidden"></div>
        </div>

        <div class="topbar-actions">
            <button id="filters-btn" title="Filters">
                <i class="fa-solid fa-sliders"></i>
                <span>Filters</span>
                <span id="filter-count" class="hidden">0</span>
            </button>
            <button id="sell-btn" onclick="window.location='sell.html'">
                <i class="fa-solid fa-plus"></i>
                <span>&nbsp;Sell</span>
            </button>
            <button id="messages-btn" class="icon-btn" title="Messages" onclick="window.location='chat.html'">
                <i class="fa-regular fa-comment"></i>
            </button>
            <button id="profile-btn" class="icon-btn" title="Profile" onclick="window.location='profile.html'">
                <i class="fa-solid fa-user"></i>
            </button>
            <button id="logout-btn" class="icon-btn" title="Log out">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <nav id="category-row">
        <button class="chip active" data-category="all">All</button>
        <button class="chip" data-category="new">New</button>
        <button class="chip" data-category="used">Second-hand</button>
        <button class="chip" data-category="rent">Rent</button>
        <button class="chip" data-category="exchange">Exchange</button>
    </nav>

    <div id="active-filters"></div>

    <main id="grid">
        <div id="loading">Loading listings...</div>
    </main>

    <!-- Filter drawer -->
    <div id="filter-drawer">
        <div class="drawer-overlay"></div>
        <aside class="drawer-panel">
            <div class="drawer-header">
                <h2>Filters</h2>
                <button class="drawer-close" id="drawer-close" title="Close">✕</button>
            </div>

            <div class="drawer-body">
                <section class="filter-section">
                    <h3>Sort by</h3>
                    <select id="sort-select">
                        <option value="newest">Newest first</option>
                        <option value="oldest">Oldest first</option>
                        <option value="price_asc">Price: low to high</option>
                        <option value="price_desc">Price: high to low</option>
                        <option value="views_desc">Most viewed</option>
                    </select>
                </section>

                <section class="filter-section">
                    <h3>Price range</h3>
                    <div class="price-range">
                        <input type="number" id="min-price" min="0" placeholder="Min">
                        <span class="dash">—</span>
                        <input type="number" id="max-price" min="0" placeholder="Max">
                    </div>
                </section>

                <section class="filter-section">
                    <h3>Material type</h3>
                    <div class="checkbox-chips" data-group="materialTypes">
                        <button type="button" class="filter-chip" data-value="Textbook">Textbook</button>
                        <button type="button" class="filter-chip" data-value="Electronics">Electronics</button>
                        <button type="button" class="filter-chip" data-value="Clothing">Clothing</button>
                        <button type="button" class="filter-chip" data-value="Furniture">Furniture</button>
                        <button type="button" class="filter-chip" data-value="Stationery">Stationery</button>
                        <button type="button" class="filter-chip" data-value="Sports">Sports</button>
                        <button type="button" class="filter-chip" data-value="Kitchen">Kitchen</button>
                        <button type="button" class="filter-chip" data-value="Other">Other</button>
                    </div>
                </section>

                <section class="filter-section">
                    <h3>Course code</h3>
                    <input type="text" id="course-filter" placeholder="e.g. MATH 1019" autocomplete="off">
                </section>

                <section class="filter-section">
                    <h3>Teacher</h3>
                    <input type="text" id="teacher-filter" placeholder="e.g. Prof. Smith" autocomplete="off">
                </section>

                <section class="filter-section">
                    <h3>Condition</h3>
                    <div class="checkbox-chips" data-group="conditions">
                        <button type="button" class="filter-chip" data-value="Like New">Like New</button>
                        <button type="button" class="filter-chip" data-value="Good">Good</button>
                        <button type="button" class="filter-chip" data-value="Fair">Fair</button>
                        <button type="button" class="filter-chip" data-value="Worn">Worn</button>
                    </div>
                </section>

                <section class="filter-section">
                    <h3>Rent duration</h3>
                    <div class="checkbox-chips" data-group="rentDurations">
                        <button type="button" class="filter-chip" data-value="week">Week</button>
                        <button type="button" class="filter-chip" data-value="month">Month</button>
                        <button type="button" class="filter-chip" data-value="semester">Semester</button>
                    </div>
                </section>
            </div>

            <div class="drawer-footer">
                <button type="button" class="drawer-reset" id="drawer-reset">Reset</button>
                <button type="button" class="drawer-apply" id="drawer-apply">Apply</button>
            </div>
        </aside>
    </div>

    <script type="module" src="home.js"></script>
</body>

</html>
