<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/44fe28e16d.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- Shared top bar -->
    <header id="auth-topbar">
        <a href="index.html" id="auth-brand">Smart Campus</a>
    </header>

    <div id="auth-stage">

        <!-- ── Sign Up card ── -->
        <div class="auth-card hidden" id="sign-up">
            <h1>Create account</h1>
            <p>Join Smart Campus and start buying and selling on campus.</p>

            <form id="sign-up-form" class="auth-form" novalidate>

                <div class="input-wrap">
                    <input type="text" id="name" placeholder=" " autocomplete="name" required>
                    <label for="name">Full Name</label>
                </div>

                <div class="input-wrap">
                    <input type="email" id="sign-up-email" placeholder=" " autocomplete="email" required>
                    <label for="sign-up-email">Email</label>
                </div>

                <div class="input-wrap" style="position:relative;">
                    <input type="text" id="school" placeholder=" " autocomplete="off" required>
                    <label for="school">School</label>
                    <div id="schools-list" class="hidden"></div>
                </div>

                <div class="input-wrap">
                    <input type="password" id="sign-up-password" placeholder=" "
                           autocomplete="new-password" required>
                    <label for="sign-up-password">Password</label>
                    <button type="button" class="pwd-toggle" data-target="sign-up-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary" id="sign-up-btn">Sign Up</button>
            </form>

            <div class="auth-redirect">
                <span>Already have an account?</span>
                <button class="link-btn" id="to-login-btn">Log in</button>
            </div>

            <div class="auth-divider">or</div>
            <div id="google-sign-up" class="google-btn"></div>
        </div>

        <!-- ── Login card ── -->
        <div class="auth-card hidden" id="login">
            <h1>Welcome back</h1>
            <p>Log in to your account.</p>

            <form id="login-form" class="auth-form" novalidate>

                <div class="input-wrap">
                    <input type="email" id="login-email" placeholder=" " autocomplete="email" required>
                    <label for="login-email">Email</label>
                </div>

                <div class="input-wrap">
                    <input type="password" id="login-password" placeholder=" "
                           autocomplete="current-password" required>
                    <label for="login-password">Password</label>
                    <button type="button" class="pwd-toggle" data-target="login-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <div class="forgot-row">
                    <a class="link-btn" href="forgot-password.html#forgot-password"
                       style="font-size:0.85rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">Log In</button>
            </form>

            <div class="auth-redirect">
                <span>Don't have an account?</span>
                <button class="link-btn" id="to-sign-up-btn">Sign up</button>
            </div>

            <div class="auth-divider">or</div>
            <div id="google-login" class="google-btn"></div>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast">
        <i id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>

    <script src="https://accounts.google.com/gsi/client" async></script>
    <script type="module" src="login.js"></script>
</body>
</html>
