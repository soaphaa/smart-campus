<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/44fe28e16d.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="forgot-password">

        <h1>Forgot Password?</h1>
        <p>Enter your email address to receive a password reset link.</p>

        <form>
            <div class="input-container">
                <input type="email" id="reset-email" name="reset-email" placeholder="" required>
                <label for="reset-email">Email</label>
            </div>

            <button>Continue</button>
        </form>

        <div class="redirect">
            <a href="login.html#login" class="redirect-btn">Back to Login</a>
        </div>

    </div>

    <div id="password-reset" class="hidden">

        <h1>Reset Password</h1>
        <p>Create a new password for your account.</p>

        <!-- password restrictions -->
        <form>
            <div class="input-container">
                <input type="password" id="reset-password" name="reset-password" placeholder=""
                    autocomplete="new-password" required>
                <i class="password-toggle fa-regular fa-eye"></i>
                <label for="reset-password">New Password</label>
            </div>

            <button>Continue</button>
        </form>

    </div>

    <div id="reset-error" class="hidden">
        <h1>Invalid Reset Link</h1>
        <p id="error-message"></p>

        <div class="redirect">
            <a href="forgot-password.html#forgot-password" class="redirect-btn">Request New Link</a>
        </div>

        <div class="redirect">
            <a href="login.html#login" class="redirect-btn">Back to Login</a>
        </div>
    </div>

    <script type="module"src="forgot-password.js"></script>
</body>

</html>
