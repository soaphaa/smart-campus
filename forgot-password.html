<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/44fe28e16d.js" crossorigin="anonymous"></script>
</head>

<body>

    <header id="auth-topbar">
        <a href="index.html" id="auth-brand">Smart Campus</a>
    </header>

    <div id="auth-stage">

        <!-- ── Step 1: enter email ── -->
        <div class="auth-card" id="forgot-password">
            <h1>Forgot password?</h1>
            <p>Enter your email address and we'll send you a reset link.</p>

            <form id="forgot-form" class="auth-form" novalidate>
                <div class="input-wrap">
                    <input type="email" id="reset-email" placeholder=" " autocomplete="email" required>
                    <label for="reset-email">Email</label>
                </div>
                <button type="submit" class="btn-primary" id="forgot-btn">Send Reset Link</button>
            </form>

            <div class="auth-redirect">
                <a class="link-btn" href="login.html#login">Back to Login</a>
            </div>
        </div>

        <!-- ── Step 2: set new password ── -->
        <div class="auth-card hidden" id="password-reset">
            <h1>Set new password</h1>
            <p>Create a strong password for your account.</p>

            <form id="reset-form" class="auth-form" novalidate>
                <div class="input-wrap">
                    <input type="password" id="reset-password" placeholder=" "
                           autocomplete="new-password" required>
                    <label for="reset-password">New Password</label>
                    <button type="button" class="pwd-toggle" data-target="reset-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary" id="reset-btn">Update Password</button>
            </form>
        </div>

        <!-- ── Error state (expired / invalid link) ── -->
        <div class="auth-card hidden" id="reset-error">
            <h1>Link expired</h1>
            <p id="error-message">This reset link is invalid or has already been used.</p>

            <div class="auth-redirect" style="flex-direction:column; gap:0.5rem;">
                <a class="link-btn" href="forgot-password.html#forgot-password">Request new link</a>
                <a class="link-btn" href="login.html#login"
                   style="font-weight:400; color:var(--text-prompt);">Back to Login</a>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast">
        <i id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>

    <script type="module" src="forgot-password.js"></script>
</body>
</html>
